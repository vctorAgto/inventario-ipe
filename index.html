<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Balcão de Literatura — Congregação Ipê</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div class="brandrow">
      <img src="logo.png" alt="Símbolo da Congregação Ipê" class="brandmark">
      <div class="brandtext">
        <p class="eyebrow"><span>Congregação Ipê · Somente leitura</span><a class="badge-link" href="editor.html">Ir para edição →</a></p>
        <h1>Balcão de Literatura</h1>
        <p class="sub">Consulta pública do inventário. Para atualizar quantidades, use a tela de edição.</p>
        <p class="updated-note" id="statusbar">Carregando...</p>
      </div>
    </div>
  </div>

  <div class="dash" id="dash"></div>

  <div class="searchrow">
    <input type="text" id="search" placeholder="Buscar por título ou código (ex: bt, Sentinela, Bíblia)…">
    <div class="view-toggle">
      <button class="btnline active-view" id="btnViewCards">▦ Cards</button>
      <button class="btnline" id="btnViewList">☰ Lista</button>
      <button class="btnline print-only-btn" id="btnPrint" hidden>🖨 Imprimir</button>
    </div>
  </div>

  <div class="drawers" id="drawers"></div>

  <div class="bulkrow">
    <h2 id="sectionTitle">Todos os itens</h2>
  </div>

  <div class="grid" id="grid"></div>
  <div class="list-wrap" id="listWrap" hidden></div>

</div>

<div class="lightbox" id="lightbox" hidden>
  <button class="lightbox-close" id="lightboxClose" aria-label="Fechar">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script src="shared.js"></script>
<script>
let items = [];
let activeCategory = CATEGORIES[0];
let searchTerm = "";
let statFilter = null; // null = navega por categoria; 'all' | 'verified' | 'attention'
let viewMode = 'cards'; // 'cards' | 'list'

const drawersEl = document.getElementById('drawers');
const gridEl = document.getElementById('grid');
const listWrapEl = document.getElementById('listWrap');
const dashEl = document.getElementById('dash');
const sectionTitleEl = document.getElementById('sectionTitle');
const statusbarEl = document.getElementById('statusbar');
const btnViewCards = document.getElementById('btnViewCards');
const btnViewList = document.getElementById('btnViewList');
const btnPrint = document.getElementById('btnPrint');

async function loadData(){
  try{
    const res = await fetch('./data.json?t=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const payload = await res.json();
    items = payload.items || [];
    statusbarEl.textContent = payload.updatedAt ? ('Atualizado em ' + formatDateTime(payload.updatedAt)) : 'Dados carregados';
    statusbarEl.classList.remove('error');
    render();
  }catch(e){
    statusbarEl.textContent = 'Não foi possível carregar data.json — verifique se o arquivo existe no repositório e se o GitHub Pages já publicou.';
    statusbarEl.classList.add('error');
  }
}

function renderDash(){
  const countable = items.filter(it => it.quantity !== null);
  const total = countable.length;
  const verified = items.filter(it => it.status === 'Verificado').length;
  const totalQty = countable.reduce((s,it) => s + (Number(it.quantity)||0), 0);
  const pct = total ? Math.round((verified/total)*100) : 0;
  const attention = items.filter(it=>it.status==='Repor'||it.status==='Baixo Estoque').length;
  const isActive = (f) => statFilter === f ? 'active' : '';
  dashEl.innerHTML = `
    <div class="stat ${isActive('all')}" data-filter="all"><div class="n">${items.length}</div><div class="l">Itens no catálogo</div></div>
    <div class="stat ${isActive('all')}" data-filter="all"><div class="n">${totalQty.toLocaleString('pt-BR')}</div><div class="l">Exemplares em estoque</div></div>
    <div class="stat ${isActive('verified')}" data-filter="verified"><div class="n">${verified}/${total}</div><div class="l">Verificados</div>
      <div class="progress-outer"><div class="progress-inner" style="width:${pct}%"></div></div>
    </div>
    <div class="stat ${isActive('attention')}" data-filter="attention"><div class="n">${attention}</div><div class="l">Precisam de atenção</div></div>
  `;
  dashEl.querySelectorAll('.stat[data-filter]').forEach(el => {
    el.addEventListener('click', () => {
      statFilter = el.dataset.filter;
      searchTerm = '';
      document.getElementById('search').value = '';
      renderDrawers();
      renderGrid();
    });
  });
}

function renderDrawers(){
  drawersEl.innerHTML = CATEGORIES.map(cat => {
    const key = CAT_KEY[cat];
    const catItems = items.filter(it => it.cat === cat);
    const verified = catItems.filter(it => it.status === 'Verificado').length;
    const active = (!searchTerm && !statFilter && cat === activeCategory) ? 'active' : '';
    return `<div class="drawer ${active}" data-cat="${cat}" style="--cat-color:var(--${key});--cat-bg:var(--${key}-bg);">
      <span class="icon">${ICONS[cat]}</span>
      <span class="name">${cat}</span>
      <span class="count">${verified}/${catItems.length} verificados</span>
    </div>`;
  }).join('');
  drawersEl.querySelectorAll('.drawer').forEach(el => {
    el.addEventListener('click', () => {
      activeCategory = el.dataset.cat;
      statFilter = null;
      searchTerm = '';
      document.getElementById('search').value = '';
      renderDrawers();
      renderGrid();
    });
  });
}

function visibleItems(){
  if(searchTerm){
    const t = searchTerm.toLowerCase();
    return items.filter(it => it.title.toLowerCase().includes(t) || it.code.toLowerCase().includes(t));
  }
  if(statFilter === 'all') return items;
  if(statFilter === 'verified') return items.filter(it => it.status === 'Verificado');
  if(statFilter === 'attention') return items.filter(it => it.status === 'Repor' || it.status === 'Baixo Estoque');
  return items.filter(it => it.cat === activeCategory);
}

function renderGrid(){
  const list = visibleItems();
  const filterLabels = { all: 'Todos os itens', verified: 'Itens verificados', attention: 'Itens que precisam de atenção' };
  sectionTitleEl.textContent = searchTerm ? `Resultados para "${searchTerm}"` : (filterLabels[statFilter] || activeCategory);

  if(viewMode === 'list'){
    gridEl.hidden = true;
    listWrapEl.hidden = false;
    renderListTable(list);
    return;
  }
  gridEl.hidden = false;
  listWrapEl.hidden = true;

  if(!list.length){
    gridEl.innerHTML = '<div class="empty">Nenhum item encontrado.</div>';
    return;
  }
  gridEl.innerHTML = list.map((it) => {
    const key = CAT_KEY[it.cat];
    const tok = STATUS_TOKEN[it.status] || 'pendente';
    const quantidadeHTML = it.quantity === null
      ? `<span class="continuo">Controle contínuo</span>`
      : `<span class="qty-static">${it.quantity}</span>`;
    const thumbHTML = it.image ? `<img class="thumb thumb-zoomable" src="${it.image}" alt="${it.title}" loading="lazy" onerror="this.remove()">` : '';
    return `<div class="card" style="--cat-color:var(--${key});--cat-bg:var(--${key}-bg);">
      <span class="hole"></span>
      ${thumbHTML}
      <span class="code">${it.code}</span>
      <p class="title">${it.title}</p>
      <div class="row">
        ${quantidadeHTML}
        <span class="status-pill" style="background:var(--${tok}-bg);color:var(--${tok});">${it.status}</span>
      </div>
      ${it.note ? `<div class="note-static">${it.note}</div>` : ''}
      ${it.lastChecked ? `<div class="lastcheck">Verificado em ${it.lastChecked}</div>` : ''}
    </div>`;
  }).join('');
  gridEl.querySelectorAll('.thumb-zoomable').forEach(img => {
    img.addEventListener('click', () => openLightbox(img.src, img.alt));
  });
}

function renderListTable(list){
  if(!list.length){
    listWrapEl.innerHTML = '<div class="empty">Nenhum item encontrado.</div>';
    return;
  }
  const rows = list.map(it => `
    <tr>
      <td class="mono">${it.code}</td>
      <td>${it.title}</td>
      <td>${it.cat}</td>
      <td class="num">${it.quantity === null ? 'Contínuo' : it.quantity}</td>
      <td>${it.status}</td>
      <td>${it.lastChecked || '—'}</td>
    </tr>`).join('');
  listWrapEl.innerHTML = `
    <table class="inv-table">
      <thead><tr><th>Código</th><th>Título</th><th>Categoria</th><th>Qtd.</th><th>Status</th><th>Verificado em</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function setViewMode(mode){
  viewMode = mode;
  btnViewCards.classList.toggle('active-view', mode === 'cards');
  btnViewList.classList.toggle('active-view', mode === 'list');
  btnPrint.hidden = mode !== 'list';
  renderGrid();
}
btnViewCards.addEventListener('click', () => setViewMode('cards'));
btnViewList.addEventListener('click', () => setViewMode('list'));
btnPrint.addEventListener('click', () => window.print());

const lightboxEl = document.getElementById('lightbox');
const lightboxImgEl = document.getElementById('lightboxImg');
function openLightbox(src, alt){
  lightboxImgEl.src = src;
  lightboxImgEl.alt = alt || '';
  lightboxEl.hidden = false;
  requestAnimationFrame(() => lightboxEl.classList.add('show'));
}
function closeLightbox(){
  lightboxEl.classList.remove('show');
  setTimeout(() => { lightboxEl.hidden = true; lightboxImgEl.src = ''; }, 200);
}
lightboxEl.addEventListener('click', closeLightbox);
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
window.addEventListener('keydown', (e) => { if(e.key === 'Escape' && !lightboxEl.hidden) closeLightbox(); });

function render(){
  renderDash();
  renderDrawers();
  renderGrid();
}

document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim();
  renderDrawers();
  renderGrid();
});

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
